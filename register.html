<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>注册 - Hello World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 400px;
            padding: 40px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 30px; font-size: 28px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #f5576c; }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .link { text-align: center; margin-top: 20px; color: #666; }
        .link a { color: #f5576c; text-decoration: none; font-weight: bold; cursor: pointer; }
        .message { padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .error { background: #fee; color: #c33; border: 1px solid #fcc; }
        .success { background: #efe; color: #3c3; border: 1px solid #cfc; }
        .hidden { display: none; }
        .welcome-icon { text-align: center; font-size: 60px; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="welcome-icon">✨</div>
    <h2>创建账号</h2>
    <div id="errorMsg" class="message error hidden"></div>
    <div id="successMsg" class="message success hidden"></div>
    <form id="registerForm">
        <div class="input-group">
            <label>用户名</label>
            <input type="text" id="username" required placeholder="请输入用户名">
        </div>
        <div class="input-group">
            <label>邮箱</label>
            <input type="email" id="email" required placeholder="请输入邮箱">
        </div>
        <div class="input-group">
            <label>密码</label>
            <input type="password" id="password" required placeholder="请输入密码（至少6位）">
        </div>
        <div class="input-group">
            <label>确认密码</label>
            <input type="password" id="confirmPassword" required placeholder="请再次输入密码">
        </div>
        <button type="submit">注册</button>
    </form>
    <div class="link">已有账号？<a href="login.html">立即登录</a></div>
</div>
<script>
    let users = JSON.parse(localStorage.getItem('users')) || [];
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        document.getElementById('errorMsg').classList.add('hidden');
        document.getElementById('successMsg').classList.add('hidden');
        if (password !== confirmPassword) {
            showError('两次输入的密码不一致！');
            return;
        }
        if (password.length < 6) {
            showError('密码长度至少为6位！');
            return;
        }
        if (users.find(u => u.username === username)) {
            showError('用户名已存在！');
            return;
        }
        users.push({ username, email, password });
        localStorage.setItem('users', JSON.stringify(users));
        showSuccess('注册成功！2秒后跳转到登录页面...');
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
    });
    function showError(msg) { const d = document.getElementById('errorMsg'); d.textContent = msg; d.classList.remove('hidden'); setTimeout(() => d.classList.add('hidden'), 3000); }
    function showSuccess(msg) { const d = document.getElementById('successMsg'); d.textContent = msg; d.classList.remove('hidden'); setTimeout(() => d.classList.add('hidden'), 2000); }
</script>
</body>
</html>
