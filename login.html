<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>登录 - Hello World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 400px;
            padding: 40px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 30px; font-size: 28px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .link { text-align: center; margin-top: 20px; color: #666; }
        .link a { color: #667eea; text-decoration: none; font-weight: bold; cursor: pointer; }
        .message { padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .error { background: #fee; color: #c33; border: 1px solid #fcc; }
        .success { background: #efe; color: #3c3; border: 1px solid #cfc; }
        .hidden { display: none; }
        .welcome-icon { text-align: center; font-size: 60px; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="welcome-icon">👋</div>
    <h2>欢迎回来</h2>
    <div id="errorMsg" class="message error hidden"></div>
    <form id="loginForm">
        <div class="input-group">
            <label>用户名</label>
            <input type="text" id="username" required placeholder="请输入用户名">
        </div>
        <div class="input-group">
            <label>密码</label>
            <input type="password" id="password" required placeholder="请输入密码">
        </div>
        <button type="submit">登录</button>
    </form>
    <div class="link">还没有账号？<a href="register.html">立即注册</a></div>
</div>
<script>
    let users = JSON.parse(localStorage.getItem('users')) || [];
    if (users.length === 0) {
        users = [
            { username: "sam", password: "123456", email: "sam@example.com" },
            { username: "sana", password: "123456", email: "sana@example.com" }
        ];
        localStorage.setItem('users', JSON.stringify(users));
    }
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const user = users.find(u => u.username === username && u.password === password);
        if (user) {
            localStorage.setItem('currentUser', JSON.stringify({username: user.username, email: user.email}));
            window.location.href = 'hello.html';
        } else {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = '用户名或密码错误！';
            errorDiv.classList.remove('hidden');
            setTimeout(() => errorDiv.classList.add('hidden'), 3000);
        }
    });
</script>
</body>
</html>
