<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hello World - 欢迎页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 500px;
            padding: 50px;
            text-align: center;
        }
        .welcome-icon { font-size: 80px; margin-bottom: 20px; animation: bounce 1s ease infinite; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        h1 { color: #333; font-size: 48px; margin-bottom: 10px; }
        .greeting { font-size: 24px; color: #667eea; margin-bottom: 20px; font-weight: bold; }
        .message { font-size: 18px; color: #666; margin-bottom: 30px; line-height: 1.6; }
        .info-box {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .info-item { margin: 10px 0; text-align: left; padding: 8px; background: white; border-radius: 8px; }
        .info-label { font-weight: bold; color: #667eea; display: inline-block; width: 80px; }
        .info-value { color: #555; }
        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 0 10px;
        }
        .logout-btn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .footer { margin-top: 20px; color: #999; font-size: 14px; }
        .btn-group { display: flex; gap: 15px; }
        .btn-group button { flex: 1; }
    </style>
</head>
<body>
<div class="container">
    <div class="welcome-icon">🎉</div>
    <h1>Hello World!</h1>
    <div id="greeting" class="greeting"></div>
    <div class="message">登录请求成功！这是hello.html页面</div>
    <div class="info-box" id="infoBox"></div>
    <div class="btn-group">
        <button onclick="location.href='login.html'">返回首页</button>
        <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>
    <div class="footer">© 2025 Hello World Application</div>
</div>
<script>
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser) { window.location.href = 'login.html'; }
    document.getElementById('greeting').innerHTML = `欢迎你，${currentUser.username}！👋`;
    document.getElementById('infoBox').innerHTML = `
        <div class="info-item"><span class="info-label">用户名：</span><span class="info-value">${currentUser.username}</span></div>
        <div class="info-item"><span class="info-label">邮箱：</span><span class="info-value">${currentUser.email}</span></div>
        <div class="info-item"><span class="info-label">登录时间：</span><span class="info-value">${new Date().toLocaleString()}</span></div>
    `;
    function logout() { localStorage.removeItem('currentUser'); window.location.href = 'login.html'; }
</script>
</body>
</html>
