<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>欢迎页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            text-align: center;
            min-width: 400px;
        }
        h1 {
            font-size: 48px;
            color: #333;
            margin-bottom: 10px;
        }
        .hello-world {
            font-size: 36px;
            color: #667eea;
            margin: 20px 0;
            font-weight: bold;
        }
        .user-list {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }
        .user-item {
            padding: 8px;
            font-size: 18px;
            border-bottom: 1px solid #ddd;
        }
        .user-item:last-child {
            border-bottom: none;
        }
        .label {
            font-weight: bold;
            color: #667eea;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 欢迎页面</h1>
        <div class="hello-world">Hello World!</div>
        
        <div class="user-list">
            <div class="user-item">
                <span class="label">© sam</span>
            </div>
            <div class="user-item">
                <span class="label">× 8 sana</span>
            </div>
        </div>
        
        <button onclick="location.href='login.html'">返回登录</button>
    </div>
</body>
</html>
